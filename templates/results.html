{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4 text-center">
            <h2 class="mb-4">Your Career Recommendations</h2>
            <div class="row">
                <div class="col-md-6">
                    <div class="list-group">
                        {% for career, prob in recommendations %}
                        <div class="list-group-item list-group-item-action mb-3 p-3">
                            <div class="d-flex w-100 justify-content-between">
                                <h4 class="mb-1 text-primary">{{ career }}</h4>
                                <span class="badge bg-success rounded-pill">{{ prob }}% Match</span>
                            </div>
                            <div class="progress mt-2" style="height: 10px;">
                                <div class="progress-bar" role="progressbar" style="width: {{ prob }}%;" aria-valuenow="{{ prob }}" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="col-md-6 text-center">
                    {% if chart %}
                    <img src="data:image/png;base64,{{ chart }}" class="img-fluid rounded shadow" alt="Career Distribution Chart">
                    {% endif %}
                </div>
            </div>
            <div class="mt-4">
                <a href="/career" class="btn btn-secondary px-5">Take Test Again</a>
                <a href="/" class="btn btn-outline-primary px-5">Back Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
