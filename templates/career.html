{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="text-center mb-4">Career Recommendation (Based on Marks)</h2>
            <form action="/career" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="gender" class="form-label">Gender</label>
                        <select class="form-select" id="gender" name="gender" required>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="part_time_job" class="form-label">Part-time Job</label>
                        <select class="form-select" id="part_time_job" name="part_time_job">
                            <option value="false">No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="absence_days" class="form-label">Absence Days (0-10)</label>
                        <input type="number" class="form-control" id="absence_days" name="absence_days" min="0" max="10" value="0" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="extracurricular_activities" class="form-label">Extracurricular Activities</label>
                        <select class="form-select" id="extracurricular_activities" name="extracurricular_activities">
                            <option value="false">No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="weekly_self_study_hours" class="form-label">Weekly Self-study Hours</label>
                        <input type="number" class="form-control" id="weekly_self_study_hours" name="weekly_self_study_hours" min="0" value="10" required>
                    </div>
                </div>

                <hr>
                <h5>Subject Marks (0-100)</h5>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="math_score" class="form-label">Math</label>
                        <input type="number" class="form-control score-input" id="math_score" name="math_score" min="0" max="100" value="70" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="history_score" class="form-label">History</label>
                        <input type="number" class="form-control score-input" id="history_score" name="history_score" min="0" max="100" value="70" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="physics_score" class="form-label">Physics</label>
                        <input type="number" class="form-control score-input" id="physics_score" name="physics_score" min="0" max="100" value="70" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="chemistry_score" class="form-label">Chemistry</label>
                        <input type="number" class="form-control score-input" id="chemistry_score" name="chemistry_score" min="0" max="100" value="70" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="biology_score" class="form-label">Biology</label>
                        <input type="number" class="form-control score-input" id="biology_score" name="biology_score" min="0" max="100" value="70" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="english_score" class="form-label">English</label>
                        <input type="number" class="form-control score-input" id="english_score" name="english_score" min="0" max="100" value="70" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="geography_score" class="form-label">Geography</label>
                        <input type="number" class="form-control score-input" id="geography_score" name="geography_score" min="0" max="100" value="70" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="total_score" class="form-label">Total Score</label>
                        <input type="number" step="0.01" class="form-control" id="total_score" name="total_score" readonly>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="average_score" class="form-label">Average Score</label>
                        <input type="number" step="0.01" class="form-control" id="average_score" name="average_score" readonly>
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5">Get Recommendation</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('.score-input').forEach(input => {
        input.addEventListener('input', updateScores);
    });

    function updateScores() {
        const scores = Array.from(document.querySelectorAll('.score-input'))
                            .map(input => parseFloat(input.value) || 0);
        const total = scores.reduce((a, b) => a + b, 0);
        const average = total / scores.length;
        document.getElementById('total_score').value = total.toFixed(2);
        document.getElementById('average_score').value = average.toFixed(2);
    }
    updateScores();
</script>
{% endblock %}
